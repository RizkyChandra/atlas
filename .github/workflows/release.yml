name: Release

# Builds single-binary `atlas` artifacts for every target in
# [workspace.metadata.dist] and attaches them to the GitHub release on a
# `v*` tag. Skeleton — adjust signing/notarization before going public.
on:
  push:
    tags:
      - "v*"

permissions:
  contents: write

env:
  CARGO_TERM_COLOR: always
  BIN: atlas

jobs:
  build:
    name: build ${{ matrix.target }}
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - { target: x86_64-unknown-linux-gnu,  os: ubuntu-latest }
          - { target: aarch64-unknown-linux-gnu, os: ubuntu-latest, cross: true }
          - { target: x86_64-apple-darwin,        os: macos-latest }
          - { target: aarch64-apple-darwin,       os: macos-latest }
          - { target: x86_64-pc-windows-msvc,     os: windows-latest }
          - { target: aarch64-pc-windows-msvc,    os: windows-latest }
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}
      - uses: Swatinem/rust-cache@v2

      - name: Install cross linker (aarch64 linux)
        if: matrix.cross
        run: |
          sudo apt-get update
          sudo apt-get install -y gcc-aarch64-linux-gnu
          echo "CARGO_TARGET_AARCH64_UNKNOWN_LINUX_GNU_LINKER=aarch64-linux-gnu-gcc" >> "$GITHUB_ENV"

      - name: Build
        run: cargo build --release --locked --target ${{ matrix.target }} -p atlas-cli

      - name: Package (unix)
        if: runner.os != 'Windows'
        run: |
          dir="atlas-${{ matrix.target }}"
          mkdir "$dir"
          cp "target/${{ matrix.target }}/release/${BIN}" "$dir/"
          tar czf "${dir}.tar.gz" "$dir"

      - name: Package (windows)
        if: runner.os == 'Windows'
        shell: bash
        run: |
          dir="atlas-${{ matrix.target }}"
          mkdir "$dir"
          cp "target/${{ matrix.target }}/release/${BIN}.exe" "$dir/"
          7z a "${dir}.zip" "$dir"

      - name: Upload to release
        uses: softprops/action-gh-release@v2
        with:
          files: |
            atlas-${{ matrix.target }}.tar.gz
            atlas-${{ matrix.target }}.zip
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
