name: goreleaser

# Builds and releases single-binary `atlas` artifacts on a `v*` tag via
# GoReleaser's Rust builder (see .goreleaser.yaml). Replaces the earlier
# cargo-dist matrix so there is exactly one release path.
on:
  push:
    tags:
      - "v*"

permissions:
  contents: write

jobs:
  goreleaser:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - uses: dtolnay/rust-toolchain@stable
        with:
          # cargo-zigbuild needs each non-host target's std installed.
          targets: aarch64-unknown-linux-gnu, x86_64-pc-windows-gnu
      # zig is the cross-compiler GoReleaser's rust builder uses via cargo-zigbuild.
      - uses: mlugg/setup-zig@v2
      - uses: goreleaser/goreleaser-action@v6
        with:
          distribution: goreleaser
          version: "~> v2"
          args: release --clean
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
